kind = "web"
  previewPath = "/"
  title = "Corporate Website"
  version = "1.0.0"

  [[services]]
  localPort = 5173
  name = "web"
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/corporate-website run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/corporate-website", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  