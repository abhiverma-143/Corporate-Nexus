kind = "web"
previewPath = "/"
title = "Corporate Group Website"
version = "1.0.0"
id = "artifacts/corporate-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18231

[services.development]
run = "pnpm --filter @workspace/corporate-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/corporate-website", "run", "build" ]
publicDir = "artifacts/corporate-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18231"
BASE_PATH = "/"
